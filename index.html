            const option = document.createElement('option');
            option.value = event.id;
            option.textContent = event.event_name;
            eventSelect.appendChild(option);
        });
    }

    async function saveEvent() {
        const name = eventName.value.trim();
        const desc = eventDesc.value.trim();

        if (!name) {
            showToast('⚠️', 'กรุณากรอกชื่อ Event', 'ต้องระบุชื่อการแข่งขัน/กิจกรรม');
            return;
        }

        try {
            if (currentEventId) {
                // Update existing event
                const { error } = await supabase
                    .from('events')
                    .update({ event_name: name, event_description: desc })
                    .eq('id', currentEventId);

                if (error) throw error;
                showToast('✅', 'อัปเดต Event สำเร็จ!', name);
            } else {
                // Create new event
                const { data, error } = await supabase
                    .from('events')
                    .insert([{ event_name: name, event_description: desc }])
                    .select();

                if (error) throw error;
                currentEventId = data[0].id;
                showToast('🎉', 'สร้าง Event สำเร็จ!', name);
            }

            await loadEvents();
            eventSelect.value = currentEventId;
            updateStats();
        } catch (error) {
            console.error('Error saving event:', error);
            showToast('❌', 'เกิดข้อผิดพลาด', 'ไม่สามารถบันทึก Event ได้');
        }
    }

    function newEvent() {
        currentEventId = null;
        eventName.value = '';
        eventDesc.value = '';
        eventSelect.value = '';
    }

    async function deleteEvent() {
        if (!currentEventId) {
            showToast('⚠️', 'กรุณาเลือก Event', 'เลือก Event ที่ต้องการลบก่อน');
            return;
        }

        if (!confirm('ต้องการลบ Event นี้? (จะลบข้อมูลผลการสุ่มด้วย)')) {
            return;
        }

        try {
            const { error } = await supabase
                .from('events')
                .delete()
                .eq('id', currentEventId);

            if (error) throw error;

            showToast('🗑️', 'ลบ Event สำเร็จ!', '');
            newEvent();
            await loadEvents();
            updateStats();
        } catch (error) {
            console.error('Error deleting event:', error);
            showToast('❌', 'เกิดข้อผิดพลาด', 'ไม่สามารถลบ Event ได้');
        }
    }

    function onEventChange() {
        const selectedId = eventSelect.value;
        if (selectedId) {
            const event = events.find(e => e.id === selectedId);
            if (event) {
                currentEventId = event.id;
                eventName.value = event.event_name;
                eventDesc.value = event.event_description || '';
            }
        } else {
            newEvent();
        }
    }

    // ========== PARTICIPANT MANAGEMENT ==========
    async function loadParticipants() {
        try {
            const { data, error } = await supabase
                .from('participants')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) throw error;

            participants = data || [];
            renderParticipants();
            updateStats();
            drawWheel();
        } catch (error) {
            console.error('Error loading participants:', error);
            showToast('❌', 'เกิดข้อผิดพลาด', 'ไม่สามารถโหลดผู้เข้าร่วมได้');
        }
    }

    async function addParticipant() {
        const fName = firstName.value.trim();
        const lName = lastName.value.trim();
        const dept = department.value.trim();

        if (!fName || !lName || !dept) {
            showToast('⚠️', 'กรุณากรอกข้อมูลให้ครบ', 'ต้องระบุ ชื่อ นามสกุล และหน่วยงาน');
            return;
        }

        try {
            const { data, error } = await supabase
                .from('participants')
                .insert([{
                    first_name: fName,
                    last_name: lName,
                    department: dept
                }])
                .select();

            if (error) throw error;

            // Clear inputs
            firstName.value = '';
            lastName.value = '';
            department.value = '';

            showToast('👤', 'เพิ่มผู้เข้าร่วมสำเร็จ!', `${fName} ${lName}`);

            await loadParticipants();
            updateStats();
        } catch (error) {
            console.error('Error adding participant:', error);
            showToast('❌', 'เกิดข้อผิดพลาด', 'ไม่สามารถเพิ่มผู้เข้าร่วมได้');
        }
    }

    async function deleteParticipant(id) {
        if (!confirm('ต้องการลบผู้เข้าร่วมนี้?')) {
            return;
        }

        try {
            const { error } = await supabase
                .from('participants')
                .delete()
                .eq('id', id);

            if (error) throw error;

            showToast('🗑️', 'ลบผู้เข้าร่วมสำเร็จ!', '');

            await loadParticipants();
            updateStats();
        } catch (error) {
            console.error('Error deleting participant:', error);
            showToast('❌', 'เกิดข้อผิดพลาด', 'ไม่สามารถลบผู้เข้าร่วมได้');
        }
    }

    function renderParticipants() {
        if (participants.length === 0) {
            participantsList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">👤</div>
                    <div>ยังไม่มีผู้เข้าร่วม</div>
                </div>
            `;
            return;
        }

        participantsList.innerHTML = participants.map(p => `
            <div class="participant-item">
                <div class="participant-info">
                    <div class="participant-name">${p.first_name} ${p.last_name}</div>
                    <div class="participant-dept">${p.department}</div>
                </div>
                <button class="btn-delete" onclick="deleteParticipant('${p.id}')">
                    ลบ
                </button>
            </div>
        `).join('');
    }

    // ========== STATISTICS ==========
    function updateStats() {
        participantCount.textContent = participants.length;
        eventCount.textContent = events.length;
    }

    // ========== WHEEL DRAWING ==========
    function drawWheel() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = Math.min(canvas.width, canvas.height) / 2 - 20;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (participants.length === 0) {
            // Draw empty wheel
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fillStyle = '#e2e8f0';
            ctx.fill();
            ctx.strokeStyle = '#cbd5e0';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.fillStyle = '#718096';
            ctx.font = '24px Segoe UI';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('เพิ่มผู้เข้าร่วมเพื่อเริ่มเกม', centerX, centerY);
            return;
        }

        const sliceAngle = (2 * Math.PI) / participants.length;

        // Draw slices
        participants.forEach((participant, i) => {
            const startAngle = i * sliceAngle + currentRotation;
            const endAngle = startAngle + sliceAngle;

            // Draw slice
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.closePath();
            ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw text
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + sliceAngle / 2);
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Segoe UI';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 4;
            ctx.fillText(`${participant.first_name} ${participant.last_name}`, radius - 20, 0);
            ctx.restore();
        });

        // Draw center circle
        ctx.beginPath();
        ctx.arc(centerX, centerY, 30, 0, 2 * Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.strokeStyle = '#667eea';
        ctx.lineWidth = 4;
        ctx.stroke();

        // Draw pointer (arrow at top)
        ctx.save();
        ctx.translate(centerX, 30);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-20, -30);
        ctx.lineTo(20, -30);
        ctx.closePath();
        ctx.fillStyle = '#fc8181';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
    }

    // ========== WHEEL SPINNING ==========
    async function spinWheel() {
        if (isSpinning) return;
        if (participants.length === 0) {
            showToast('⚠️', 'กรุณาเพิ่มผู้เข้าร่วม', 'ต้องมีผู้เข้าร่วมก่อนหมุนวงล้อ');
            return;
        }
        if (!currentEventId) {
            showToast('⚠️', 'กรุณาเลือก Event', 'เลือกหรือสร้าง Event ก่อนหมุนวงล้อ');
            return;
        }

        isSpinning = true;
        spinBtn.disabled = true;
        spinBtn.innerHTML = '<span class="spinner">⏳</span> กำลังหมุน...';

        const totalSpins = MIN_SPINS + Math.random() * (MAX_SPINS - MIN_SPINS);
        const randomDegrees = Math.random() * 360;
        const totalRotation = (totalSpins * 360 + randomDegrees) * (Math.PI / 180);
        
        const startTime = Date.now();
        const startRotation = currentRotation;

        function animate() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / SPIN_DURATION, 1);
            
            // Cubic ease-out
            const easeOut = 1 - Math.pow(1 - progress, 3);
            
            currentRotation = startRotation + totalRotation * easeOut;
            drawWheel();

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                currentRotation = currentRotation % (2 * Math.PI);
                drawWheel();
                determineWinner();
            }
        }

        animate();
    }

    async function determineWinner() {
        const sliceAngle = (2 * Math.PI) / participants.length;
        
        // The pointer is at the top (90 degrees or π/2)
        // We need to find which slice is at the top after rotation
        const pointerAngle = Math.PI / 2;
        const adjustedAngle = (2 * Math.PI - currentRotation + pointerAngle) % (2 * Math.PI);
        const winnerIndex = Math.floor(adjustedAngle / sliceAngle);
        const winner = participants[winnerIndex];

        // Save to database
        try {
            const { error } = await supabase
                .from('draw_results')
                .insert([{
                    event_id: currentEventId,
                    participant_id: winner.id
                }]);

            if (error) throw error;
        } catch (error) {
            console.error('Error saving draw result:', error);
        }

        // Show confetti
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
        });

        // Show winner modal
        setTimeout(() => {
            displayWinner(winner);
        }, 500);

        isSpinning = false;
        spinBtn.disabled = false;
        spinBtn.innerHTML = '🎲 หมุนวงล้อ';
    }

    function displayWinner(winner) {
        const event = events.find(e => e.id === currentEventId);
        const now = new Date();
        const dateTimeStr = now.toLocaleString('th-TH', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        winnerDisplay.innerHTML = `
            <div class="winner-icon">🎉</div>
            <div class="winner-name">${winner.first_name} ${winner.last_name}</div>
            <div class="winner-dept">${winner.department}</div>
            <div class="winner-event">
                <div class="winner-event-name">📅 ${event?.event_name || 'N/A'}</div>
                <div class="winner-event-desc">${event?.event_description || ''}</div>
            </div>
            <div class="winner-datetime">📅 ${dateTimeStr}</div>
        `;

        winnerModal.classList.add('active');
    }

    function resetWheel() {
        if (isSpinning) return;
        currentRotation = 0;
        drawWheel();
    }

    // ========== EXPORT ==========
    async function exportWinner() {
        try {
            const modalContent = document.querySelector('.modal-content');
            const canvas = await html2canvas(modalContent, {
                scale: 2,
                backgroundColor: '#ffffff'
            });

            const link = document.createElement('a');
            const winnerName = winnerDisplay.querySelector('.winner-name').textContent.replace(/\s+/g, '_');
            link.download = `ผู้โชคดี_${winnerName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            showToast('📸', 'ดาวน์โหลดสำเร็จ!', 'ไฟล์รูปภาพถูกบันทึกแล้ว');
        } catch (error) {
            console.error('Error exporting:', error);
            showToast('❌', 'เกิดข้อผิดพลาด', 'ไม่สามารถ Export รูปภาพได้');
        }
    }

    // ========== START APP ==========
    init();
</script>
