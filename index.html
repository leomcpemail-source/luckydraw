body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

}

.container {
  max-width: 1400px;

h1 {
  text-align: center;

  margin-bottom: 30px;
  font-size: 2.5em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);

.main-layout {
  display: grid;
  grid-template-columns: 350px 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.sidebar {
  background: white;

  font-size: 1.4em;
  color: #667eea;
  margin-bottom: 20px;

.form-group {
  margin-bottom: 15px;
}

label {

  color: #333;

}

input, textarea, select {

  transition: border-color 0.3s;

input:focus, textarea:focus, select:focus {
  outline: none;

textarea {

  min-height: 80px;
}

button {

  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;

  -webkit-tap-highlight-color: transparent;
}

.btn-primary {

.btn-primary:hover {

.btn-danger {

.btn-warning {

}

.btn-warning:hover {

}

.participants-list {
  margin-top: 20px;

  overflow-y: auto;
}

.participant-item {
  background: #f5f5f5;
  padding: 10px;

}

.participant-info {

.participant-name {

  <script>
    // Global variables
    let supabase = null;
    let participants = [];
    let currentEvent = null;
    let isSpinning = false;
    let rotation = 0;
    let currentWinner = null;

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];

    // Supabase Configuration - ใส่ตรงนี้เลย
    const SUPABASE_URL = 'https://zvugngzhlnopfioumflh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dWduZ3pobG5vcGZpb3VtZmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzA3MjIsImV4cCI6MjA5MjUwNjcyMn0.EJncLjujUP4LqjRyrP4dUQcvpmXE8T7ax9cZdhsD5SA';

    // Initialize on load
    window.onload = function() {
      // Initialize Supabase with hardcoded values
      initSupabase(SUPABASE_URL, SUPABASE_KEY);
      adjustCanvasSize();
      loadEvents();
      drawWheel();
      
      // Adjust canvas on window resize
      window.addEventListener('resize', function() {
        adjustCanvasSize();
        drawWheel();
      });
    };

    // Adjust canvas size for mobile
    function adjustCanvasSize() {
      const wheelSection = document.querySelector('.wheel-section');
      const maxSize = Math.min(wheelSection.clientWidth - 60, 500);
      canvas.width = maxSize;
      canvas.height = maxSize;
    }

    // Supabase Configuration
    function initSupabase(url, key) {
      try {
        supabase = window.supabase.createClient(url, key);
        console.log('✓ Supabase connected successfully');
        loadParticipants();
        loadEvents();
      } catch (error) {
        console.error('Supabase connection error:', error);
        alert('ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
      }
    }

    // Event Management
    async function loadEvents() {
      if (!supabase) return;

      const { data, error } = await supabase
        .from('events')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading events:', error);
        return;
      }

      const select = document.getElementById('eventSelect');
      select.innerHTML = '<option value="">-- สร้าง Event ใหม่ --</option>';
      
      data.forEach(event => {
        const option = document.createElement('option');
        option.value = event.id;
        option.textContent = event.event_name;
        select.appendChild(option);
      });

      document.getElementById('totalEvents').textContent = data.length;
    }

    async function loadEventData() {
      const eventId = document.getElementById('eventSelect').value;
      
      if (!eventId) {
        document.getElementById('eventName').value = '';
        document.getElementById('eventDesc').value = '';
        currentEvent = null;
        return;
      }

      const { data, error } = await supabase
        .from('events')
        .select('*')
        .eq('id', eventId)
        .single();

      if (error) {
        console.error('Error loading event:', error);
        return;
      }

      currentEvent = data;
      document.getElementById('eventName').value = data.event_name;
      document.getElementById('eventDesc').value = data.event_description || '';
    }

    async function saveEvent() {
      if (!supabase) {
        alert('กรุณาตั้งค่า Supabase ก่อน');
        return;
      }

      const eventName = document.getElementById('eventName').value.trim();
      
      if (!eventName) {
        alert('กรุณากรอกชื่อ Event');
        return;
      }

      const eventData = {
        event_name: eventName,
        event_description: document.getElementById('eventDesc').value.trim()
      };

      let result;
      if (currentEvent) {
        // Update existing event
        result = await supabase
          .from('events')
          .update(eventData)
          .eq('id', currentEvent.id)
          .select()
          .single();
      } else {
        // Create new event
        result = await supabase
          .from('events')
          .insert([eventData])
          .select()
          .single();
      }

      if (result.error) {
        alert('เกิดข้อผิดพลาด: ' + result.error.message);
        return;
      }

      currentEvent = result.data;
      alert('บันทึก Event สำเร็จ!');
      loadEvents();
      
      // Select the saved event
      document.getElementById('eventSelect').value = currentEvent.id;
    }

    async function clearEvent() {
      if (!currentEvent) {
        alert('ไม่มี Event ที่เลือก');
        return;
      }

      if (!confirm('ต้องการลบ Event นี้และข้อมูลที่เกี่ยวข้องทั้งหมดหรือไม่?')) {
        return;
      }

      const { error } = await supabase
        .from('events')
        .delete()
        .eq('id', currentEvent.id);

      if (error) {
        alert('เกิดข้อผิดพลาด: ' + error.message);
        return;
      }

      currentEvent = null;
      document.getElementById('eventName').value = '';
      document.getElementById('eventDesc').value = '';
      document.getElementById('eventSelect').value = '';
      
      alert('ลบ Event สำเร็จ!');
      loadEvents();
    }

    // Participant Management
    async function loadParticipants() {
      if (!supabase) return;

      const { data, error } = await supabase
        .from('participants')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading participants:', error);
        return;
      }

      participants = data;
      updateParticipantsList();
      drawWheel();
      document.getElementById('totalParticipants').textContent = participants.length;
    }

    async function addParticipant() {
      if (!supabase) {
        alert('กรุณาตั้งค่า Supabase ก่อน');
        return;
      }

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const department = document.getElementById('department').value.trim();

      if (!firstName || !lastName || !department) {
        alert('กรุณากรอกข้อมูลให้ครบถ้วน');
        return;
      }

      const { data, error } = await supabase
        .from('participants')
        .insert([{
          first_name: firstName,
          last_name: lastName,
          department: department
        }])
        .select()
        .single();

      if (error) {
        alert('เกิดข้อผิดพลาด: ' + error.message);
        return;
      }

      // Clear form
      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value = '';
      document.getElementById('department').value = '';

      loadParticipants();
    }

    async function deleteParticipant(id) {
      if (!confirm('ต้องการลบผู้เข้าร่วมคนนี้หรือไม่?')) {
        return;
      }

      const { error } = await supabase
        .from('participants')
        .delete()
        .eq('id', id);

      if (error) {
        alert('เกิดข้อผิดพลาด: ' + error.message);
        return;
      }

      loadParticipants();
    }

    function updateParticipantsList() {
      const list = document.getElementById('participantsList');
      list.innerHTML = '';

      if (participants.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: #999;">ยังไม่มีผู้เข้าร่วม</p>';
        return;
      }

      participants.forEach(p => {
        const item = document.createElement('div');
        item.className = 'participant-item';
        item.innerHTML = `
          <div class="participant-info">
            <div class="participant-name">${p.first_name} ${p.last_name}</div>
            <div class="participant-dept">${p.department}</div>
          </div>
          <button class="btn-delete" onclick="deleteParticipant('${p.id}')">ลบ</button>
        `;
        list.appendChild(item);
      });
    }

    // Wheel Drawing
    function drawWheel() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = Math.min(canvas.width, canvas.height) / 2 - 30;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (participants.length === 0) {
        ctx.fillStyle = '#ccc';
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
        ctx.fill();
        
        ctx.fillStyle = '#666';
        ctx.font = `${Math.max(16, radius / 15)}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('ยังไม่มีผู้เข้าร่วม', centerX, centerY);
        return;
      }

      const sliceAngle = (2 * Math.PI) / participants.length;

      participants.forEach((p, i) => {
        const startAngle = rotation + i * sliceAngle;
        const endAngle = startAngle + sliceAngle;

        // Draw slice
        ctx.fillStyle = colors[i % colors.length];
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fill();

        // Draw border
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Draw text
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = 'center';
        ctx.fillStyle = 'white';
        const fontSize = Math.max(12, radius / 15);
        ctx.font = `bold ${fontSize}px Arial`;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        const name = `${p.first_name} ${p.last_name}`;
        ctx.fillText(name, radius * 0.6, 5);
        ctx.restore();
      });

      // Draw center circle
      const centerCircleRadius = Math.max(20, radius / 8);
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(centerX, centerY, centerCircleRadius, 0, 2 * Math.PI);
      ctx.fill();
      ctx.strokeStyle = '#667eea';
      ctx.lineWidth = 5;
      ctx.stroke();

      // Draw pointer
      drawPointer();
    }

    function drawPointer() {
      const centerX = canvas.width / 2;
      const pointerY = Math.max(15, canvas.height / 25);
      const pointerSize = Math.max(15, canvas.width / 25);

      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.moveTo(centerX, pointerY);
      ctx.lineTo(centerX - pointerSize, pointerY + pointerSize * 2);
      ctx.lineTo(centerX + pointerSize, pointerY + pointerSize * 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Wheel Spinning
    async function spinWheel() {
      if (isSpinning) return;
      
      if (participants.length === 0) {
        alert('ยังไม่มีผู้เข้าร่วม กรุณาเพิ่มผู้เข้าร่วมก่อน');
        return;
      }

      if (!currentEvent) {
        alert('กรุณาสร้างหรือเลือก Event ก่อน');
        return;
      }

      isSpinning = true;
      document.getElementById('spinBtn').innerHTML = '<span class="loading"></span> กำลังหมุน...';
      document.getElementById('spinBtn').disabled = true;

      const spinDuration = 5000;
      const spins = 5 + Math.random() * 3;
      const targetRotation = spins * 2 * Math.PI;
      const startTime = Date.now();
      const startRotation = rotation;

      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / spinDuration, 1);
        
        // Easing function
        const easeOut = 1 - Math.pow(1 - progress, 3);
        
        rotation = startRotation + targetRotation * easeOut;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          finishSpin();
        }
      }

      animate();
    }

    async function finishSpin() {
      const sliceAngle = (2 * Math.PI) / participants.length;
      const normalizedRotation = rotation % (2 * Math.PI);
      const pointerAngle = (2 * Math.PI - normalizedRotation) % (2 * Math.PI);
      const winnerIndex = Math.floor(pointerAngle / sliceAngle);
      const winner = participants[winnerIndex];

      currentWinner = winner;

      // Save to database
      await supabase
        .from('draw_results')
        .insert([{
          event_id: currentEvent.id,
          participant_id: winner.id
        }]);

      // Show confetti
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 }
      });

      setTimeout(() => {
        isSpinning = false;
        document.getElementById('spinBtn').innerHTML = '🎲 หมุนวงล้อ';
        document.getElementById('spinBtn').disabled = false;
        showWinnerModal(winner);
      }, 1000);
    }

    function resetWheel() {
      if (isSpinning) return;
      rotation = 0;
      drawWheel();
    }

    // Winner Modal
    function showWinnerModal(winner) {
      const container = document.getElementById('winnerCardContainer');
      container.innerHTML = `
        <div class="winner-card" id="winnerCard">
          <div class="winner-name">${winner.first_name} ${winner.last_name}</div>
          <div class="winner-dept">${winner.department}</div>
        </div>
        <div class="event-info">
          <h3>ข้อมูล Event</h3>
          <p><strong>ชื่อ Event:</strong> ${currentEvent.event_name}</p>
          ${currentEvent.event_description ? `<p><strong>รายละเอียด:</strong> ${currentEvent.event_description}</p>` : ''}
          <p><strong>วันที่:</strong> ${new Date().toLocaleDateString('th-TH', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          })}</p>
        </div>
      `;
      
      document.getElementById('winnerModal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('winnerModal').style.display = 'none';
    }

    async function exportWinnerImage() {
      const card = document.getElementById('winnerCardContainer');
      
      try {
        const canvas = await html2canvas(card, {
          backgroundColor: 'white',
          scale: 2
        });
        
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `ผู้โชคดี_${currentWinner.first_name}_${currentWinner.last_name}.png`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        });
        
        alert('Export สำเร็จ!');
      } catch (error) {
        console.error('Export error:', error);
        alert('เกิดข้อผิดพลาดในการ Export');
      }
    }

    // Click outside modal to close
    window.onclick = function(event) {
      const modal = document.getElementById('winnerModal');
      if (event.target === modal) {
        closeModal();
      }
    };
  </script>

</body>
